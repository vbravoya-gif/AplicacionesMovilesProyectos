<div class="custom-input">
  <ion-icon *ngIf="icon" [name]="icon"></ion-icon>

  <ion-input 
    [formControl]="control"
    [type]="type"
    [label]="label"
    label-placement="floating"
    [autocomplete]="autocomplete">
  </ion-input>

  <ion-button *ngIf="isPassword" (click)="showOrHidePassword()" fill="clear" shape="round">
    <ion-icon slot="icon-only" [name]="hide ? 'eye-outline' : 'eye-off-outline'"></ion-icon>
  </ion-button>
</div>
