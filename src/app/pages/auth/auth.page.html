<app-header title="Iniciar Sesión"></app-header>

<ion-content class="ion-padding">
  <div class="d-flex-center">

    <form [formGroup]="form" class="auth-form" (ngSubmit)="submit()">

      <app-logo></app-logo>

      <app-custom-input autocomplete="email" icon="mail-outline" [control]="form.controls.email" type="email"
        label="Correo">
      </app-custom-input>

      <div class="validators" *ngIf="form.controls.email.errors && form.controls.email.touched">
        <div *ngIf="form.controls.email.errors?.['required']">El correo es requerido</div>
        <div *ngIf="form.controls.email.errors?.['email']">Ingrese un correo válido</div>
      </div>

      <app-custom-input autocomplete="current-password" icon="lock-closed-outline" [control]="form.controls.password"
        type="password" label="Contraseña">
      </app-custom-input>

      <div class="validators" *ngIf="form.controls.password.errors && form.controls.password.touched">
        <div *ngIf="form.controls.password.errors?.['required']">La contraseña es requerida</div>
      </div>

      <div class="ion-text-end ion-padding-horizontal">
        <ion-button fill="clear" color="primary" routerLink="/forgot-password" style="--padding-end: 0;">
          ¿Olvidaste tu contraseña?
        </ion-button>
      </div>

      <ion-button expand="block" mode="ios" class="submit" type="submit" [disabled]="form.invalid">
        Ingresar
        <ion-icon slot="end" name="log-in-outline"></ion-icon>
      </ion-button>

      <ion-button routerLink="/sign-up" expand="block" mode="ios" fill="outline" class="margin-top">
        Registrarse
        <ion-icon slot="end" name="person-add-outline"></ion-icon>
      </ion-button>

      <div class="ion-margin-top ion-padding ion-text-center">
        <p style="color: #737373; font-family: monospace; font-size: 11px;">{{ form.value | json }}</p>
      </div>

    </form>
  </div>
</ion-content>
